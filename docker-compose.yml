services:
  mongodb:
    image: mongo:latest
    container_name: sgbsim_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: .
    container_name: sgbsim_backend
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongodb:27017/ilabs
      - JWT_SECRET=YOUR_SUPER_SECRET_JWT_KEY_CHANGE_ME
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: sgbsim_frontend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - BACKEND_URL=http://backend:3002
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
