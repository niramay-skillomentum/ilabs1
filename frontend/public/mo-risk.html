<!DOCTYPE html>
<html>
<head>
  <title>MO Risk Management System</title>
</head>

<body style="margin:0; font-family:Segoe UI, Arial; background:#f5f7fa;">

<!-- TOP BAR -->
<div style="
  height:48px;
  background:#0B1F3A;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  font-size:14px;
">
  <div style="font-weight:600;">
    MO Risk Management System
  </div>
  <div id="userInfo"></div>
</div>

<!-- MAIN -->
<div style="display:flex; height:calc(100vh - 48px);">

  <!-- LEFT -->
  <div style="width:40%; border-right:1px solid #ddd; background:white; display:flex; flex-direction:column;">

    <div style="padding:10px; border-bottom:1px solid #eee;">
      <input id="searchBox" placeholder="Search trades..."
        style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
    </div>

    <div id="resultsList" style="flex:1; overflow-y:auto;"></div>

  </div>

  <!-- RIGHT -->
  <div style="width:60%; padding:16px; display:flex; flex-direction:column;">

    <div id="docViewer" style="
      background:white;
      border:1px solid #ddd;
      padding:16px;
      flex:1;
      overflow-y:auto;
    ">
      Select a document to view
    </div>

  </div>

</div>

<script>

// Cookie helper
function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : null;
}
function getToken() { return sessionStorage.getItem("auth_token") || getCookie("auth_token"); }

const urlParams = new URLSearchParams(window.location.search);
let userId = urlParams.get("userId");
let desk = urlParams.get("desk");

if(!getToken()){
  alert("Session expired. Login again.");
  window.location.href = "/";
}

if (!userId) {
  fetch("/api/session/info", {
    headers: { "Authorization": "Bearer " + getToken() }
  })
  .then(res => res.json())
  .then(data => {
    if(data.success) {
      userId = data.fullName || data.userId;
      desk = data.desk || "Risk";
      document.getElementById("userInfo").innerText = desk + " Desk | Welcome, " + userId;
    }
  })
  .catch(err => console.error(err));
} else {
  document.getElementById("userInfo").innerText =
    (desk || "") + " Desk | Welcome, " + userId;
}

let allTrades = [];

// In-memory amendments (no localStorage)
let amendments = {};

/* =========================
   LOAD TRADES
========================= */
function loadTrades(){
  fetch("/api/trade/all", {
    headers: { "Authorization": "Bearer " + getToken() }
  })
    .then(res => res.json())
    .then(data => {
      allTrades = data.trades || [];
      renderResults(allTrades);
    });
}

/* =========================
   RENDER LIST
========================= */
function renderResults(list){

  const container = document.getElementById("resultsList");
  container.innerHTML = "";

  list.forEach(trade => {

    const div = document.createElement("div");

    div.style.padding = "12px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";

    div.innerHTML = `
      <div style="font-weight:600;">
        Termsheet - ${trade.counterparty || "Unknown"}
      </div>
      <div style="font-size:12px; color:#555;">
        ${trade.tradeRef}
      </div>
      <div style="font-size:12px; color:#777;">
        ${trade.currency} ${Number(trade.amount).toLocaleString()}
      </div>
    `;

    div.onclick = () => openDocument(trade);

    container.appendChild(div);

  });
}

/* =========================
   OPEN DOCUMENT (FIXED)
========================= */
function openDocument(trade){

  const viewer = document.getElementById("docViewer");

  const moTruth = trade.truths?.mo || trade.truth;
  let refAmount = (moTruth && moTruth.amount !== undefined) ? moTruth.amount : trade.amount;
  let refValueDate = (moTruth && moTruth.valueDate) ? moTruth.valueDate : trade.valueDate;
  let refCurrency = (moTruth && moTruth.currency) ? moTruth.currency : trade.currency;
  let refCounterparty = (moTruth && moTruth.counterparty) ? moTruth.counterparty : trade.counterparty;

  const tradeDateFormatted = trade.tradeDate ? new Date(trade.tradeDate).toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"}) : "";
  const valueDateFormatted = refValueDate ? new Date(refValueDate).toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"}) : "";

  viewer.innerHTML = `
    <h3>Termsheet (FO Reference)</h3>
    <hr>
    <table style="width:100%; border-collapse: collapse; font-size: 14px; border: 1px solid #ddd;">
      <tbody>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold; width: 30%;">Trade Ref:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.tradeRef || ""}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Status:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.currentStatus || ""}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Next Desk:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.nextDesk || ""}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Age:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.age || 0}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Trade Date:</td><td style="padding: 6px; border: 1px solid #ddd;">${tradeDateFormatted}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Value Date:</td><td style="padding: 6px; border: 1px solid #ddd;">${valueDateFormatted}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Counterparty:</td><td style="padding: 6px; border: 1px solid #ddd;">${refCounterparty || "N/A"}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Entity:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.entity || ""}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">FO Region:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.foRegion || ""}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Product:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.product || ""}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Trade Type:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.tradeType || ""}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Settlement Type:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.settlementType || ""}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Direction:</td><td style="padding: 6px; border: 1px solid #ddd;">${trade.direction || ""}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Currency:</td><td style="padding: 6px; border: 1px solid #ddd;">${refCurrency || ""}</td></tr>
        <tr><td style="padding: 6px; border: 1px solid #ddd; font-weight: bold;">Amount:</td><td style="padding: 6px; border: 1px solid #ddd;">${Number(refAmount).toLocaleString()}</td></tr>
      </tbody>
    </table>
  `;
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchBox").addEventListener("input", function(){

  const val = this.value.toLowerCase();

  const filtered = allTrades.filter(t =>
    (t.tradeRef || "").toLowerCase().includes(val) ||
    (t.currency || "").toLowerCase().includes(val) ||
    String(t.amount || "").includes(val)
  );

  renderResults(filtered);
});

/* =========================
   INIT
========================= */
loadTrades();

</script>

</body>
</html>
